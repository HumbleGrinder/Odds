<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oscars 2026 – Awards Odds</title>
  
  <!-- Firebase CDN Scripts -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAcJTHkUYTW1zd7PSAHJ6ZpGCxI69CDDaE",
      authDomain: "odds-32154.firebaseapp.com",
      databaseURL: "https://odds-32154-default-rtdb.firebaseio.com",
      projectId: "odds-32154",
      storageBucket: "odds-32154.firebasestorage.app",
      messagingSenderId: "239351340320",
      appId: "1:239351340320:web:88f4473d0ec8801ed4cb45"
    };
    firebase.initializeApp(firebaseConfig);
  </script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap');

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #0a0a0f;
    }

    h1, h2 {
      font-family: 'Playfair Display', serif;
    }

    .gold-shimmer {
      background: linear-gradient(135deg, #f5c842 0%, #e8a910 30%, #ffd700 60%, #c8930a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .oscars-bg {
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(245, 200, 66, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(200, 147, 10, 0.06) 0%, transparent 50%),
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
        url('images/oscarsbg.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .glass-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .gold-border {
      border: 1px solid rgba(245, 200, 66, 0.3);
    }

    select option {
      background: #1a1a2e;
      color: white;
    }

    tr:hover td {
      background-color: rgba(245, 200, 66, 0.05) !important;
    }

    .best-cell {
      background-color: #ffd700 !important;
    }

    ::-webkit-scrollbar {
      height: 6px;
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(245,200,66,0.4);
      border-radius: 3px;
    }
  </style>
</head>
<body class="oscars-bg min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;

    const Oscars = () => {
      const [nominees, setNominees] = useState([]);
      const [loading, setLoading] = useState(true);
      const [selectedCategory, setSelectedCategory] = useState('picture');

      const categories = [
        { key: 'picture', label: 'Best Picture' },
        { key: 'director', label: 'Best Director' },
        { key: 'actor', label: 'Best Actor' },
        { key: 'actress', label: 'Best Actress' },
        { key: 'supporting-actor', label: 'Best Supporting Actor' },
        { key: 'supporting-actress', label: 'Best Supporting Actress' },
        { key: 'original', label: 'Best Original Screenplay' },
        { key: 'adapted', label: 'Best Adapted Screenplay' },
        { key: 'casting', label: 'Best Casting' },
        { key: 'international', label: 'Best International Feature Film' },
        { key: 'documentary', label: 'Best Documentary Feature' },
        { key: 'animated', label: 'Best Animated Feature Film' },
        { key: 'cinemato', label: 'Best Cinematography' },
        { key: 'editing', label: 'Best Editing' },
        { key: 'sound', label: 'Best Sound' },
        { key: 'score', label: 'Best Original Score' },
        { key: 'production', label: 'Best Production Design' },
        { key: 'song', label: 'Best Song' },
        { key: 'costumes', label: 'Best Costumes' }
      ];

      const sportsbooks = [
        { key: 'polymarket',  label: 'Polymarket',  bgColor: 'bg-blue-600',    textColor: 'text-white' },
        { key: 'kalshi',      label: 'Kalshi',      bgColor: 'bg-indigo-600',  textColor: 'text-white' },
        { key: 'fanduel',     label: 'FanDuel',     bgColor: 'bg-blue-300',    textColor: 'text-white' },
        { key: 'draftkings',  label: 'DraftKings',  bgColor: 'bg-green-500',   textColor: 'text-black' },
        { key: 'betonline',   label: 'BetOnline',   bgColor: 'bg-gray-400',    textColor: 'text-black' },
        { key: 'bookmaker',   label: 'Bookmaker',   bgColor: 'bg-purple-600',  textColor: 'text-white' },
        { key: 'thescore',    label: 'theScore',    bgColor: 'bg-red-600',     textColor: 'text-white' },
        { key: 'betano',      label: 'Betano',      bgColor: 'bg-orange-500',  textColor: 'text-white' },
        { key: 'kambi',       label: 'Kambi',       bgColor: 'bg-white',       textColor: 'text-blue-600' },
        { key: 'betmgm',      label: 'BetMGM',      bgColor: 'bg-yellow-500',  textColor: 'text-black' },
        { key: 'pointsbet',   label: 'PointsBet',   bgColor: 'bg-black',       textColor: 'text-red-500' },
        { key: 'bet99',       label: 'Bet99',       bgColor: 'bg-red-700',     textColor: 'text-white' },
      ];

      useEffect(() => {
        fetchData();
      }, [selectedCategory]);

      const fetchData = () => {
        setLoading(true);
        const dbRef = firebase.database().ref(`oscars/${selectedCategory}/nominees`);
        dbRef.on('value', (snapshot) => {
          const data = snapshot.val();
          setNominees(data || []);
          setLoading(false);
        });
        return () => dbRef.off();
      };

      const americanOddsToProb = (odds) => {
        const num = parseFloat(odds);
        if (isNaN(num)) return null;
        return num < 0
          ? Math.abs(num) / (Math.abs(num) + 100)
          : 100 / (num + 100);
      };

      const probToAmericanOdds = (prob) => {
        return prob >= 0.5
          ? Math.round(-(prob * 100) / (1 - prob))
          : Math.round(((1 - prob) * 100) / prob);
      };

      const calculateAverageOdds = (nominee) => {
        const probs = sportsbooks
          .map(book => nominee.odds?.[book.key])
          .filter(odds => odds && odds !== '-')
          .map(odds => americanOddsToProb(odds))
          .filter(prob => prob !== null);
        if (probs.length === 0) return null;
        const avgProb = probs.reduce((s, p) => s + p, 0) / probs.length;
        return { odds: probToAmericanOdds(avgProb), percentage: Math.round(avgProb * 100) };
      };

      const getTimeAgo = (dateString) => {
        if (!dateString) return '-';
        const diffDays = Math.floor(Math.abs(new Date() - new Date(dateString)) / 86400000);
        if (diffDays === 0) return 'Today';
        if (diffDays === 1) return '1 day ago';
        return `${diffDays} days ago`;
      };

      const findBestOdds = (nominee) => {
        const oddsArray = sportsbooks
          .map(book => ({ book: book.key, odds: nominee.odds?.[book.key] }))
          .filter(item => item.odds && item.odds !== '-');
        if (oddsArray.length === 0) return null;
        let best = oddsArray[0];
        oddsArray.forEach(item => {
          const c = parseFloat(item.odds), b = parseFloat(best.odds);
          if (c < 0 && b < 0) { if (c > b) best = item; }
          else if (c > 0 && b > 0) { if (c > b) best = item; }
          else if (c > 0 && b < 0) best = item;
        });
        return best.book;
      };

      return (
        <div className="min-h-screen">
          <div className="container mx-auto px-4 py-8">

            {/* Header */}
            <div className="text-center mb-10">
              <a href="index.html" className="text-yellow-400 hover:text-yellow-300 text-sm mb-4 inline-block tracking-widest uppercase opacity-80">
                ← Back to Home
              </a>
              <h1 className="text-6xl font-black gold-shimmer mb-2">
                🏆 Oscars 2026
              </h1>
              <p className="text-gray-400 tracking-widest text-sm uppercase">March 15, 2026 &nbsp;·&nbsp; Mega Ultra Tracker</p>
            </div>

            {/* Category Selector */}
            <div className="mb-8 max-w-3xl mx-auto">
              <div className="glass-card gold-border rounded-xl p-5">
                <label className="block text-yellow-400 text-xs font-semibold mb-2 tracking-widest uppercase">
                  Select Category
                </label>
                <select
                  value={selectedCategory}
                  onChange={(e) => setSelectedCategory(e.target.value)}
                  className="w-full bg-gray-900 text-white border border-yellow-600 border-opacity-40 rounded-lg px-4 py-3 text-lg font-semibold focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:border-transparent"
                >
                  {categories.map(cat => (
                    <option key={cat.key} value={cat.key}>{cat.label}</option>
                  ))}
                </select>
              </div>
            </div>

            {/* Odds Table */}
            <div className="max-w-full">
              <div className="glass-card gold-border rounded-xl shadow-2xl overflow-hidden">
                {loading ? (
                  <div className="text-center py-16">
                    <div className="text-yellow-400 text-xl animate-pulse">Loading odds...</div>
                  </div>
                ) : nominees.length === 0 ? (
                  <div className="text-center py-16">
                    <div className="text-gray-400 text-xl">No nominees added yet for this category.</div>
                  </div>
                ) : (
                  <div className="overflow-x-auto">
                    <table className="w-full">
                      <thead>
                        <tr style={{ background: 'linear-gradient(90deg, #1a1a2e, #0f0f1a)' }}>
                          <th className="px-5 py-4 text-left text-xs font-bold text-gray-300 uppercase tracking-widest whitespace-nowrap">
                            Nominee
                          </th>
                          <th className="px-4 py-4 text-center text-xs font-bold uppercase tracking-widest whitespace-nowrap" style={{ background: 'rgba(109,40,217,0.7)', color: '#e9d5ff' }}>
                            Avg Odds
                          </th>
                          {sportsbooks.map(book => (
                            <th key={book.key} className={`px-3 py-4 text-center text-xs font-bold uppercase tracking-wider whitespace-nowrap ${book.bgColor} ${book.textColor}`}>
                              {book.label}
                            </th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {nominees.map((nominee, idx) => {
                          const avgData = calculateAverageOdds(nominee);
                          const bestBook = findBestOdds(nominee);
                          return (
                            <tr
                              key={nominee.id}
                              title={`Last updated: ${getTimeAgo(nominee.lastUpdated)}`}
                              style={{ cursor: 'help' }}
                              className={idx % 2 === 0 ? 'bg-gray-900 bg-opacity-60' : 'bg-gray-800 bg-opacity-30'}
                            >
                              {/* Nominee name + thumbnail */}
                              <td className="px-5 py-4">
                                <div className="flex items-center gap-3">
                                  {nominee.thumbnail ? (
                                    <img
                                      src={nominee.thumbnail}
                                      alt={nominee.name}
                                      className="w-10 h-14 object-cover rounded shadow-lg"
                                      onError={(e) => { e.target.style.display = 'none'; }}
                                    />
                                  ) : (
                                    <div className="w-10 h-14 rounded bg-gray-700 flex items-center justify-center text-gray-500 text-xs">
                                      –
                                    </div>
                                  )}
                                  <span className="font-semibold text-white text-sm">{nominee.name}</span>
                                </div>
                              </td>

                              {/* Average */}
                              <td className="px-4 py-4 text-center" style={{ background: 'rgba(109,40,217,0.5)' }}>
                                {avgData ? (
                                  <div className="flex flex-col items-center">
                                    <span className="font-black text-white text-base">
                                      {avgData.odds > 0 ? '+' : ''}{avgData.odds}
                                    </span>
                                    <span className="text-xs text-purple-200 opacity-75">
                                      ({avgData.percentage}%)
                                    </span>
                                  </div>
                                ) : (
                                  <span className="text-purple-300 opacity-40">–</span>
                                )}
                              </td>

                              {/* Sportsbook columns */}
                              {sportsbooks.map(book => {
                                const odds = nominee.odds?.[book.key];
                                const isBest = book.key === bestBook;
                                return (
                                  <td
                                    key={book.key}
                                    className={`px-3 py-4 text-center ${isBest ? '' : book.bgColor}`}
                                    style={isBest ? { backgroundColor: '#ffd700' } : {}}
                                  >
                                    {odds ? (
                                      <span className={`text-sm ${isBest ? 'font-black text-black' : `font-bold ${book.textColor}`}`}>
                                        {odds}
                                      </span>
                                    ) : (
                                      <span className={`${book.textColor} opacity-30 text-sm`}>–</span>
                                    )}
                                  </td>
                                );
                              })}
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            </div>

            {/* Footer */}
            <div className="text-center mt-12">
              <p className="text-gray-500 text-sm mb-2">
                For the record, if Sinners wins, it would be the biggest upset in Oscars history based on precursor wins
              </p>
              <p className="text-gray-600 text-xs">Come on you Spurs</p>
            </div>

          </div>
        </div>
      );
    };

    ReactDOM.render(<Oscars />, document.getElementById('root'));
  </script>
</body>
</html>
